<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/styles.css" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to NomadTalk</title>
  </head>
  <body>
    <div class="status-bar">
      <div class="status-bar__column">9:40</div>
      <div class="status-bar__column">
        <i class="fa-solid fa-signal"></i>
        <span>5G</span>
        <i class="fa-solid fa-battery-three-quarters"></i>
      </div>
    </div>

    <header class="welcome-header">
      <h1>Welcome to NomadTalk</h1>
      <img class="welcome-header__logo nomad-logo" src="img/logo.svg" />
      <p>If you have a Nomad Account, log in with your email or phone number</p>
    </header>

    <form class="login-form">
      <input type="text" placeholder="Email or phone number" />
      <input type="password" placeholder="Password" />
      <input type="submit" value="Log-In" class="login-form__btn" />
      <a href="https://nomadcoders.co/join">
        <input type="button" value="Sign Up" class="login-form__btn" />
      </a>
      <a
        href="https://docs.google.com/forms/d/e/1FAIpQLSewaOZmyWnYN-hG9sQ8s-HiW73tP7xGj60pj9YRk1E5yTX00w/viewform"
        >Find Nomad Account or Password</a
      >
    </form>

    <script
      src="https://kit.fontawesome.com/130998b18d.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
