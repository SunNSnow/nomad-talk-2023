<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/styles.css" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - NomadTalk</title>
  </head>
  <body class="settings-body">
    <div class="status-bar">
      <div class="status-bar__column">9:40</div>
      <div class="status-bar__column">
        <i class="fa-solid fa-signal"></i>
        <span>5G</span>
        <i class="fa-solid fa-battery-three-quarters"></i>
      </div>
    </div>

    <header class="alt-header settings-header">
      <a href="more.html"><i class="fa-solid fa-angle-left"></i></a>
      <h1 class="screen-header__title">설정</h1>
      <i class="fa-solid fa-magnifying-glass"></i>
    </header>

    <main class="main-screen settings-screen">
      <section class="user-component user-component-lg user-component-settings">
        <div class="user-component__column">
          <div class="user-component__profile-icon profile-icon__user">
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="user-component__text">
            <span class="user-component__text-main">User</span>
            <span class="user-component__text-sub">+82 10-2345-6789</span>
          </div>
        </div>
        <div class="user-component__column">
          <span class="user-component__icon user-component__settings">
            프로필 관리
          </span>
        </div>
      </section>

      <section class="settings-list">
        <div class="settings-list__row">
          <div class="settings-list__row-column">
            <i class="fa-solid fa-user-lock"></i>
            <span class="settings-list__main-text">노마드계정</span>
            <!--<i class="fa-solid fa-n fa-xs"></i>!-->
          </div>
          <div class="settings-list__row-column">
            <span class="settings-list__sub-text">user@nomadcoders.co</span>
          </div>
        </div>
        <div class="settings-list__row">
          <div class="settings-list__row-column">
            <i class="fa-solid fa-lock"></i>
            <span class="settings-list__main-text">개인/보안</span>
            <!--<i class="fa-solid fa-n fa-xs"></i>!-->
          </div>
          <div class="settings-list__row-column">
            <!--<span class="settings-list__sub-text">user@nomadcoders.co</span>!-->
          </div>
        </div>
        <div class="settings-list__row">
          <div class="settings-list__row-column">
            <i class="fa-solid fa-user"></i>
            <span class="settings-list__main-text">친구</span>
            <!--<i class="fa-solid fa-n fa-xs"></i>!-->
          </div>
          <div class="settings-list__row-column">
            <!--<span class="settings-list__sub-text">user@nomadcoders.co</span>!-->
          </div>
        </div>
        <div class="settings-list__row">
          <div class="settings-list__row-column">
            <i class="fa-solid fa-bell"></i>
            <span class="settings-list__main-text">알림</span>
            <!--<i class="fa-solid fa-n fa-xs"></i>!-->
          </div>
          <div class="settings-list__row-column">
            <!--<span class="settings-list__sub-text">user@nomadcoders.co</span>!-->
          </div>
        </div>
        <div class="settings-list__row">
          <div class="settings-list__row-column">
            <i class="fa-solid fa-sun"></i>
            <span class="settings-list__main-text">화면</span>
            <!--<i class="fa-solid fa-n fa-xs"></i>!-->
          </div>
          <div class="settings-list__row-column">
            <!--<span class="settings-list__sub-text">user@nomadcoders.co</span>!-->
          </div>
        </div>
        <div class="settings-list__row">
          <div class="settings-list__row-column">
            <i class="fa-solid fa-brush"></i>
            <span class="settings-list__main-text">테마</span>
            <i class="fa-solid fa-n fa-xs"></i>
          </div>
          <div class="settings-list__row-column">
            <span class="settings-list__sub-text">시스템 설정 모드</span>

        <div class="settings-list__row">
          <div class="settings-list__row-column">
            <i class="fa-solid fa-comment"></i>

          <div class="settings-list__row-column">
            <!--<span class="settings-list__sub-text">user@nomadcoders.co</span>!-->
          </div>
        </div>

        <div class="settings-list__row">
          <div class="settings-list__row-column">
            <i class="fa-solid fa-bullhorn"></i>

          <div class="settings-list__row-column">

            <!--<span class="settings-list__sub-text">user@nomadcoders.co</span>!-->
