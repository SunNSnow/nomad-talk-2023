<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/styles.css" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>More - NomadTalk</title>
  </head>
  <body class="more-body">
    <div class="status-bar">
      <div class="status-bar__column">9:40</div>
      <div class="status-bar__column">
        <i class="fa-solid fa-signal"></i>
        <span>5G</span>
        <i class="fa-solid fa-battery-three-quarters"></i>
      </div>
    </div>

    <header class="screen-header more-header">
      <h1 class="screen-header__title">더보기</h1>
      <div class="screen-header__icons">
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-solid fa-qrcode"></i>
        <i class="fa-solid fa-gear"></i>
      </div>
    </header>

    <main class="main-screen more-screen">
      <section class="nomad-wallet">
        <div class="nomad-wallet__title">
          <div class="nomad-wallet__title-column">
            <span class="semi-bold">지갑</span>
            <i class="fa-solid fa-angle-right"></i>
          </div>
          <div class="nomad-wallet__title-column">
            <span>Nomad 인증서</span>
          </div>
        </div>
        <div class="nomad-wallet__tab">
          <div class="nomad-wallet__tab-column">
            <i class="fa-regular fa-file"></i>
            <span>주민등록등본 톡으로 5초만에 받기</span>
          </div>
          <div class="nomad-wallet__tab-column">
            <i class="fa-solid fa-angle-right"></i>
          </div>
        </div>
        <div class="nomad-wallet__balance">
          <div class="nomad-wallet__balance-column semi-bold">Nomad Pay</div>
          <div class="nomad-wallet__balance-column semi-bold">$ 5B</div>
        </div>
        <div class="nomad-wallet__btns">
          <div class="nomad-wallet__btns-column">
            <span>송금</span>
            <div></div>
            <span>결제</span>
            <div></div>
            <span>자산</span>
          </div>
          <div class="nomad-wallet__btns-column">
            <i class="fa-solid fa-cart-shopping"></i>
            <span>구매내역</span>
          </div>
        </div>
      </section>
      <section class="more-icons">
        <div class="more-icons__row">
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-gift"></i>
            <span>선물하기</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-gifts"></i>
            <span>받은선물</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-box-open"></i>
            <span>선물의발견</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-regular fa-face-smile"></i>
            <span>이모티콘</span>
          </div>
        </div>
        <div class="more-icons__row">
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-shop"></i>
            <span>쇼핑하기</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-m"></i>
            <span>메이커스</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-paw"></i>
            <span>프렌즈</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-shirt"></i>
            <span>패션</span>
          </div>
        </div>
        <div class="more-icons__row">
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-box-archive"></i>
            <span>톡서랍</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-envelope"></i>
            <span>메일</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-calendar-days"></i>
            <span>캘린더</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-comments"></i>
            <span>오픈채팅</span>
          </div>
        </div>
        <div class="more-icons__row">
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-gamepad"></i>
            <span>게임</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-utensils"></i>
            <span>주문하기</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-ticket"></i>
            <span>멜론티켓</span>
          </div>
          <div class="more-icons__row-icon">
            <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
            <i class="fa-solid fa-border-all"></i>
            <span>전체서비스</span>
          </div>
        </div>
      </section>
      <a
        class="adv-youtube__link"
        href="https://www.youtube.com/watch?v=Z9cCjrbTW50"
      >
        <img
          class="adv-youtube__img"
          src="https://i.ytimg.com/vi/Z9cCjrbTW50/hq720.jpg?sqp=-oaymwEcCNAFEJQDSFXyq4qpAw4IARUAAIhCGAFwAcABBg==&rs=AOn4CLBLUD_CcZTZA3DgwHU0ztk5AJlggg"
        />
      </a>
    </main>

    <nav class="nav-bar">
      <a href="friends.html">
        <div class="new-alarm new-alarm__number nav-bar__new-alarm">1</div>
        <i class="fa-regular fa-user"></i>
      </a>
      <a href="chatting.html">
        <div class="new-alarm new-alarm__number nav-bar__new-alarm">3</div>
        <i class="fa-regular fa-comment"></i>
      </a>
      <a href="view.html">
        <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
        <i class="fa-regular fa-eye"></i>
      </a>
      <a href="shopping.html">
        <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
        <i class="fa-regular fa-credit-card"></i>
      </a>
      <a href="more.html">
        <div class="new-alarm nav-bar__new-alarm"></div>
        <i class="fa-solid fa-ellipsis"></i>
      </a>
    </nav>

    <script
      src="https://kit.fontawesome.com/130998b18d.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
