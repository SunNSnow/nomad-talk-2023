<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/styles.css" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatting - NomadTalk</title>
  </head>
  <body class="chatting-body">
    <div class="status-bar">
      <div class="status-bar__column">9:40</div>
      <div class="status-bar__column">
        <i class="fa-solid fa-signal"></i>
        <span>5G</span>
        <i class="fa-solid fa-battery-three-quarters"></i>
      </div>
    </div>

    <header class="screen-header">
      <h1 class="screen-header__title">채팅</h1>
      <div class="screen-header__icons">
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-solid fa-comment-medical"></i>
        <i class="fa-solid fa-comments"></i>
        <i class="fa-solid fa-gear"></i>
      </div>
    </header>

    <a href="https://nomadcoders.co/carrot-market">
      <div class="advertise-bar">
        <div class="advertise-bar__img">
          <img
            class="advertise-bar__img-file"
            src="https://nomadcoders.co/_next/image?url=https%3A%2F%2Fd1telmomo28umc.cloudfront.net%2Fmedia%2Fpublic%2Fthumbnails%2Fcarrot-market.jpg&w=2048&q=75"
          />
        </div>
        <div class="advertise-bar__text">
          <span class="advertise-bar__text-main"
            >[캐럿마켓 클론코딩] NextJS, React18, Tailwind, Prisma</span
          >
          <span class="advertise-bar__text-sub"
            >172개의 강의, 요즘 대세 서비인 캐럿마켓 클론코딩, 가장 최신 스택과
            기술로 풀스택 서비스 구현하기</span
          >
        </div>
      </div>
    </a>

    <main class="main-screen chatting-screen">
      <section class="user-component">
        <div class="user-component__column">
          <img class="user-component__profile-photo" src="img/lynn.jpg" />
          <div class="user-component__text">
            <span class="user-component__text-main">Lynn</span>
            <span class="user-component__text-sub">Welcome to NomadTalk!</span>
          </div>
        </div>
        <div class="user-component__column user-component__chat">
          <span class="user-component__chat-time"> 오후 9:39 </span>
          <div class="user-component__chat-alarm">1</div>
        </div>
      </section>

      <section class="user-component">
        <div class="user-component__column">
          <img class="user-component__profile-photo" src="img/nico.jpeg" />
          <div class="user-component__text">
            <span class="user-component__text-main">Nico</span>
            <span class="user-component__text-sub"
              >Having fun with clonecoding?</span
            >
          </div>
        </div>
        <div class="user-component__column user-component__chat">
          <span class="user-component__chat-time"> 오후 9:05 </span>
          <div class="user-component__chat-alarm">1</div>
        </div>
      </section>

      <section class="user-component">
        <div class="user-component__column">
          <div class="user-component__profile-group">
            <img
              class="user-component__profile-photo user-component__profile-photo-sm"
              src="img/lynn.jpg"
            />
            <img
              class="user-component__profile-photo user-component__profile-photo-sm"
              src="img/nico.jpeg"
            />
            <div
              class="user-component__profile-icon user-component__profile-icon-sm profile-icon__user"
            >
              <i class="fa-solid fa-user"></i>
            </div>
            <img
              class="user-component__profile-photo user-component__profile-photo-sm"
              src="img/logo.svg"
            />
          </div>
          <div class="user-component__text">
            <span class="user-component__text-main"
              >Nomad Coders Groupchat</span
            >
            <span class="user-component__text-sub">We are Nomad Coders!</span>
          </div>
        </div>
        <div class="user-component__column user-component__chat">
          <span class="user-component__chat-time"> 오후 8:22 </span>
          <div class="user-component__chat-alarm">1</div>
        </div>
      </section>
    </main>

    <nav class="nav-bar">
      <a href="friends.html">
        <div class="new-alarm new-alarm__number nav-bar__new-alarm">1</div>
        <i class="fa-regular fa-user"></i>
      </a>
      <a href="chatting.html">
        <div class="new-alarm new-alarm__number nav-bar__new-alarm">3</div>
        <i class="fa-solid fa-comment"></i>
      </a>
      <a href="view.html">
        <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
        <i class="fa-regular fa-eye"></i>
      </a>
      <a href="shopping.html">
        <!--<div class="new-alarm nav-bar__new-alarm"></div>!-->
        <i class="fa-regular fa-credit-card"></i>
      </a>
      <a href="more.html">
        <div class="new-alarm nav-bar__new-alarm"></div>
        <i class="fa-solid fa-ellipsis"></i>
      </a>
    </nav>

    <script
      src="https://kit.fontawesome.com/130998b18d.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
